# --- general arena timers ---

# Cooldown in seconds before the arena match officially starts
arena_starting_cooldown: 30

# Default match duration in seconds (420 seconds = 7 minutes)
arena_time_default: 420

# Cooldown in seconds during the ending/victory phase before players leave
arena_ending_phase_cooldown: 10


# --- gameplay settings ---

# Allow players to manually choose their teams before the game starts
choose_team_system: true

# Total amount of lives each team starts with by default
team_starting_lives_default: 100

# Invulnerability duration in seconds after a player respawns
respawn_invulnerability: 3

# Amount of snowballs a player receives when getting a kill
snowballs_per_kill: 8

# Amount of snowballs every player starts with at the match beginning
initial_snowballs: 64

# Whether a player must have an empty inventory to join a game
empty_inventory_to_join: false


# --- economy & rewards configuration ---

# The type of economy to use. Options: "paintball" (internal) or others depending on hooks
economy_used: "paintball"

# Coins granted per kill. Supports ranges like "1-3"
coins_per_kill: "1-3"

# If true, commands rewards will be executed only after the player teleports out
rewards_executed_after_teleport: false

# Commands executed for the winning team members
winners_command_rewards:
    - "msg %player% &aYou've won! Here, take this reward."
    - "paintball givecoins %player% %random_10*kills-20*kills%"

# Commands executed for the losing team members
losers_command_rewards:
    - "msg %player% &aYou've lost! Here, take this compensation reward."
    - "paintball givecoins %player% %random_2*kills-6*kills%"

# Commands executed for all players if the match ends in a tie
tie_command_rewards:
    - "msg %player% &aIt's a tie! Here, take this reward."
    - "paintball givecoins %player% %random_2*kills-6*kills%"


# --- hologram configuration ---

# Number of top players to display on the leaderboard hologram
top_hologram_number_of_players: 10

# Update interval for the leaderboard hologram in seconds (300 seconds = 5 minutes)
top_hologram_update_time: 300


# --- arena broadcast settings ---

broadcast_starting_arena:
    # Should the plugin broadcast a message when an arena is starting?
    enabled: true
    # Worlds where the starting broadcast message will be visible
    worlds:
        - "world"


# --- team configuration ---

# Configure names, colors, and wool items for all selectable teams
teams:
    blue:
        name: "&1&lBlue"
        color: 18175
        item: "BLUE_WOOL"
    red:
        name: "&4&lRed"
        color: 16711680
        item: "RED_WOOL"
    yellow:
        name: "&e&lYellow"
        color: 15335168
        item: "YELLOW_WOOL"
    green:
        name: "&2&lGreen"
        color: 1017094
        item: "GREEN_WOOL"
    orange:
        name: "&6&lOrange"
        color: 15963657
        item: "ORANGE_WOOL"
    purple:
        name: "&5&lPurple"
        color: 15338477
        item: "PURPLE_WOOL"
    black:
        name: "&0&lBlack"
        color: 0
        item: "BLACK_WOOL"
    white:
        name: "&f&lWhite"
        color: 16777215
        item: "WHITE_WOOL"


# --- chat & command permissions ---

# List of commands that players are allowed to use while inside an active arena match
commands_whitelist:
    - "/paintball leave"

# Enable or disable the custom arena-only chat system
arena_chat_enabled: true

# Format of the chat inside the arena. Placeholders: %team%, %player%, %message%
arena_chat_format: "&f<&8[&7%team%&8] &a%player%&f> %message%"


# --- hotbar items configuration ---

# Item to leave the active game
leave_item_enabled: true
leave_item:
    item: IRON_DOOR
    name: "&7[&c&lLeave&7]"
    lore:
        - "&7Right Click to leave the game."

# Item to view/buy available killstreaks
killstreaks_item_enabled: true
killstreaks_item:
    item: GOLD_NUGGET
    name: "&eKillcoins: &a%amount%"
    lore:
        - "&7Right Click to buy Killstreaks."

# Item to open the hats selection GUI
hats_item_enabled: true
hats_item:
    item: DIAMOND_HELMET
    name: "&7[&b&lSelect your Hat&7]"
    lore:
        - "&7Right Click to select a Hat."

# Item to quickly join another arena map after a match ends
play_again_item_enabled: true
play_again_item:
    item: LIGHT_BLUE_DYE
    name: "&7[&9&lPlay Again&7]"
    lore:
        - "&7Right Click to play in another map."


# --- sound & effect configuration ---

# Sound format: "SOUND_NAME;VOLUME;PITCH;[global]"
killedBySound: "block.note_block.pling;10;0.1"
killSound: "entity.firework_rocket.blast;10;2"
expireKillstreakSound: "block.note_block.basedrum;10;2"
snowballShootSound: "entity.arrow.shoot;10;0.5"
shopUnlockSound: "entity.firework_rocket.blast;10;2"
hatAbilityActivatedSound: "block.chest.open;10;1.5"
explosiveHatSound: "entity.generic.explode;10;1"
startCooldownSound: "block.note_block.pling;10;1"
startGameSound: "block.note_block.pling;10;2"

# The particle trail effect spawned when snowballs are thrown
snowball_particle: "SNOW_SHOVEL"


# --- database configuration ---

mysql-database:
    enabled: false
    host: localhost
    port: 3306
    username: paintball
    password: Nicouschulas
    database: paintball


# --- update checker configuration ---

update-checker:
    # Enable/disable the update checker
    enabled: true

    # How should update notifications be displayed?
    # Options: "console", "player" or "both"
    notify-method: "both"


